<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>
<body>
    <header class="w-full flex justify-between px-10 bg-white shadow-sm flex-wrap mb-5">
        <div class="flex items-center py-7">
            <img class="w-[30px]" src="/assets/github-logo.png" alt="">
           
            <p class="text-xl">GitHub Issues Tracker</p>

        </div>
        <div class="flex items-center gap-5">
           <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
       <circle cx="11" cy="11" r="8"></ circle>
       <path d="m21 21-4.3-4.3"></path>
       </g>
       </svg>
       <input  type="search" required placeholder="Search" />
      </label>
      <button class="btn btn-primary ">Primary</button>
        </div>
    </header>
    <section class="w-10/12 mx-auto bg-white shadow-sm">
        <div class="my-7 py-3 px-5 flex gap-3">
            <button class="btn  btn-primary">All</button>
            <button class="btn btn-outline btn-primary">Open</button>
            <button class="btn btn-outline btn-primary">closed</button>
        </div>

    </section>
    <section  class="w-10/12 mx-auto bg-white shadow">
        <div class="flex justify-between py-3 px-3">
            <div class="flex items-center gap-1">
                <img src="/assets/Aperture.png" alt="">
                <div>
                    <h2>50 Issuse</h2>
                    <p>Track and manage your project issuse</p>
                </div>
            </div>
            <div class="flex gap-3">
                 <div class="flex items-center gap-1 ">
                 <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                <span>Open</span>
                 </div>

    
                <div class="flex items-center gap-1">
                <span class="w-2 h-2 bg-red-800 rounded-full"></span>
                <span>Closed</span>
            </div>

            </div>

        </div>

    </section>

    <script src="/script/index.js"></script>
</body>
</html>
