<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css">
    <title> GitHub Issues Tracker</title>
</head>
<body>
    <header>
       <div class="w-11/12 mx-auto  space-y-4 place-items-center rounded-sm">
         <img class="py-10" src="./assets/github-logo.png" alt="">
        
            <h1 class="text-4xl font-bold">GitHub Issues Tracker</h1>
            <p class="text-md font-semibold ">Sign in to manage your issues</p>
            
       </div>
    </header>
   <section >
    <div class="w-11/12 mx-auto mt-7">
      <h1 class="mb-2 font-semibold">Username</h1>
       <label class="input validator w-12/12">
  
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
      <circle cx="12" cy="7" r="4"></circle>
    </g>
  </svg>
  <input id="input-name"
    type="text"
    required
    placeholder=" Eter Username"
    pattern="[A-Za-z][A-Za-z0-9\-]*"
    minlength="3"
    maxlength="30"
    title="Only letters, numbers or dash"
  />
</label>
<div class="text-blue-400 mt-2 mb-5">Default:admin</div>
        <h1 class="mb-2 font-semibold">Password</h1>
       <label class="input validator w-12/12">
  
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
      <circle cx="12" cy="7" r="4"></circle>
    </g>
  </svg>
  <input id="input-password"
    type="text"
    required
    placeholder=" Eter Password"
    pattern="[A-Za-z][A-Za-z0-9\-]*"
    minlength="3"
    maxlength="30"
    title="Only letters, numbers or dash"
  />
</label>
<div class="text-blue-500 mt-2">Default:admin123</div>
    </div>
   <div class="w-11/12 mx-auto my-10">
     <button id="click-btn" class="btn btn-primary w-12/12">Sign in</button>
   </div>
   </section>
  <section class="w-11/12 mx-auto ">
     <div class="border"></div>
   <div>
    <h1 class="font-semibold text-center">OR</h1>
   </div>
   <div class="border"></div>
  </section>
  <section class="w-11/12 mx-auto">
    <div class="text-center">
        <p class="text-gray-400 py-5">Demo Credentials:</p>
        </div>
        <div class="bg-gray-300 text-center py-10">
            <p><span class="font-bold">Username</span>:admin</p>
            <p><span class="font-bold">Password</span>: admin123</p>

        </div>
    
  </section>
   


    <script src="./script/index.js"></script>
</body>
</html>
